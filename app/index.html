<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Prototype</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll">

      <header class="k-row" style="gap: var(--s-3); justify-content: center;">
        <img src="../kit/brands/forge.svg" width="36" height="36" alt="FORGE" />
        <span class="k-text-title" style="font-size: var(--t-num-lg); letter-spacing: 0.04em;">FORGE</span>
      </header>

      <section class="k-card k-card--quiet">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-2);">
          <span class="k-eyebrow">App</span>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <a href="./home.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-house"></i></span>
            <span class="k-habit-row__name">Home</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
          <a href="./plan.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-calendar-blank"></i></span>
            <span class="k-habit-row__name">Plan</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
          <a href="./workout.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
            <span class="k-habit-row__name">Workout</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
          <a href="./habits.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--green"><i class="ph ph-check-square"></i></span>
            <span class="k-habit-row__name">Habits</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
          <a href="./settings.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile"><i class="ph ph-gear-six"></i></span>
            <span class="k-habit-row__name">Settings</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
          <a href="./account.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile"><i class="ph ph-user-circle"></i></span>
            <span class="k-habit-row__name">Account</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
        </div>
      </section>

      <section class="k-card k-card--quiet">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-2);">
          <span class="k-eyebrow">Onboarding</span>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <a href="./onboarding/welcome.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-hand-waving"></i></span>
            <span class="k-habit-row__name">Welcome</span>
            <span class="k-text-faint">1</span>
          </a>
          <a href="./onboarding/signup.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile"><i class="ph ph-user-plus"></i></span>
            <span class="k-habit-row__name">Sign in</span>
            <span class="k-text-faint">2</span>
          </a>
          <a href="./onboarding/connect.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--blue"><i class="ph ph-plugs-connected"></i></span>
            <span class="k-habit-row__name">Connect</span>
            <span class="k-text-faint">3</span>
          </a>
          <a href="./onboarding/habits.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--green"><i class="ph ph-check-square"></i></span>
            <span class="k-habit-row__name">Pick habits</span>
            <span class="k-text-faint">4</span>
          </a>
          <a href="./onboarding/plan.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
            <span class="k-habit-row__name">Pick a plan</span>
            <span class="k-text-faint">5</span>
          </a>
          <a href="./onboarding/first-sync.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile"><i class="ph ph-cloud-arrow-down"></i></span>
            <span class="k-habit-row__name">First sync</span>
            <span class="k-text-faint">6</span>
          </a>
        </div>
      </section>

      <section class="k-card k-card--quiet" style="text-align: center;">
        <span class="k-text-faint">FORGE · v0.1 prototype</span>
      </section>

    </div>
  </main>
</body>
</html>
