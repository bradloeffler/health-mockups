<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Habits</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll">

      <header class="k-row k-row--between">
        <span class="k-text-body" style="font-weight: 500;">Habits</span>
        <button class="k-icon-tile" aria-label="Account"><i class="ph ph-user-circle"></i></button>
      </header>

      <section class="k-card k-card--accent">
        <div class="k-row" style="gap: var(--s-4);">
          <div class="k-ring" style="--ring-color: var(--c-green); --ring-pct: 75; --ring-size: calc(var(--s-8) + var(--s-6) + var(--s-0));">
            <svg class="k-ring__svg" viewBox="0 0 100 100" aria-hidden="true">
              <circle class="k-ring__track" cx="50" cy="50" r="46" fill="none" stroke-width="7"/>
              <circle class="k-ring__bar" cx="50" cy="50" r="46" fill="none" stroke-width="7" pathLength="100"/>
            </svg>
            <div class="k-ring__num">75</div>
            <div class="k-ring__label">7-day</div>
          </div>
          <div class="k-stack k-stack--tight" style="min-width: 0;">
            <span class="k-eyebrow">Compliance</span>
            <span class="k-text-title">21 / 28</span>
            <span class="k-text-faint">Best streak · 12 days</span>
          </div>
        </div>
      </section>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-2);">
          <span class="k-eyebrow">Today &middot; 2 / 4</span>
          <button class="k-pill k-pill--ghost"><i class="ph ph-plus"></i> New</button>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row k-habit-row--done">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-sun"></i></span>
            <span class="k-habit-row__name">Vitamins AM</span>
            <span class="k-checkbox is-checked"><i class="ph ph-check"></i></span>
          </div>
          <div class="k-habit-row k-habit-row--done">
            <span class="k-icon-tile k-icon-tile--blue"><i class="ph ph-person-simple-tai-chi"></i></span>
            <span class="k-habit-row__name">Stretch 10 min</span>
            <span class="k-checkbox is-checked"><i class="ph ph-check"></i></span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--green"><i class="ph ph-drop"></i></span>
            <span class="k-habit-row__name">Hydration</span>
            <span class="k-habit-row__trail">3 / 4</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-moon-stars"></i></span>
            <span class="k-habit-row__name">Vitamins PM</span>
            <span class="k-checkbox" aria-label="Toggle"></span>
          </div>
        </div>
      </section>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-3);">
          <span class="k-eyebrow">Last 7 days</span>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--sm k-icon-tile--amber"><i class="ph ph-sun"></i></span>
            <span class="k-habit-row__name">Vitamins AM</span>
            <span class="k-habit-row__trail">7 / 7</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--sm k-icon-tile--blue"><i class="ph ph-person-simple-tai-chi"></i></span>
            <span class="k-habit-row__name">Stretch 10 min</span>
            <span class="k-habit-row__trail">5 / 7</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--sm k-icon-tile--green"><i class="ph ph-drop"></i></span>
            <span class="k-habit-row__name">Hydration</span>
            <span class="k-habit-row__trail">6 / 7</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--sm k-icon-tile--amber"><i class="ph ph-moon-stars"></i></span>
            <span class="k-habit-row__name">Vitamins PM</span>
            <span class="k-habit-row__trail">3 / 7</span>
          </div>
        </div>
      </section>

    </div>

    <nav class="k-nav" aria-label="Primary">
      <button class="k-nav__btn" aria-label="Home"><i class="ph ph-house"></i></button>
      <button class="k-nav__btn" aria-label="Plan"><i class="ph ph-calendar-blank"></i></button>
      <button class="k-nav__btn" aria-current="page" aria-label="Habits"><i class="ph ph-check-square"></i></button>
      <button class="k-nav__btn" aria-label="Settings"><i class="ph ph-gear-six"></i></button>
    </nav>
  </main>
  <script src="./_nav.js"></script>
</body>
</html>
