<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Account</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll">

      <header class="k-row k-row--between">
        <button class="k-icon-tile k-icon-tile--sm" aria-label="Back"><i class="ph ph-caret-left"></i></button>
        <span class="k-text-body" style="font-weight: 500;">Account</span>
        <span class="k-icon-tile k-icon-tile--sm" style="visibility: hidden;"></span>
      </header>

      <section class="k-card">
        <div class="k-row" style="gap: var(--s-3);">
          <span class="k-icon-tile k-icon-tile--lg k-icon-tile--amber"><i class="ph ph-user"></i></span>
          <div class="k-stack k-stack--tight" style="min-width: 0;">
            <span class="k-text-body" style="font-weight: 500;">Brad Loeffler</span>
            <span class="k-text-sub" style="overflow-wrap: anywhere;">brad@12thbean.com</span>
          </div>
        </div>
      </section>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-3);">
          <span class="k-eyebrow">Connected sources</span>
          <button class="k-pill k-pill--ghost"><i class="ph ph-plus"></i> Add</button>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--green"><i class="ph ph-heartbeat"></i></span>
            <span class="k-habit-row__name">Whoop</span>
            <span class="k-pill k-pill--green">Live</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--blue"><i class="ph ph-circle"></i></span>
            <span class="k-habit-row__name">Oura</span>
            <span class="k-pill k-pill--green">Live</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-heart"></i></span>
            <span class="k-habit-row__name">Apple Health</span>
            <span class="k-pill k-pill--ghost">Off</span>
          </div>
        </div>
      </section>

      <section class="k-card">
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-bell"></i></span>
            <span class="k-habit-row__name">Notifications</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-shield-check"></i></span>
            <span class="k-habit-row__name">Privacy</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-credit-card"></i></span>
            <span class="k-habit-row__name">Subscription</span>
            <span class="k-pill k-pill--amber">Pro</span>
          </div>
        </div>
      </section>

      <section class="k-card k-card--quiet" style="text-align: center;">
        <button class="k-pill k-pill--ghost" style="height: calc(var(--s-6) + var(--s-0)); padding: 0 var(--s-4);">Sign out</button>
      </section>

    </div>
  </main>
  <script src="./_nav.js"></script>
</body>
</html>
