<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Settings</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll">

      <header class="k-row k-row--between">
        <span class="k-text-body" style="font-weight: 500;">Settings</span>
        <button class="k-icon-tile" aria-label="Account"><i class="ph ph-user-circle"></i></button>
      </header>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-3);">
          <span class="k-eyebrow">Units</span>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-ruler"></i></span>
            <span class="k-habit-row__name">Distance</span>
            <span class="k-pill k-pill--ghost">mi</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-scales"></i></span>
            <span class="k-habit-row__name">Weight</span>
            <span class="k-pill k-pill--ghost">lb</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-thermometer"></i></span>
            <span class="k-habit-row__name">Temperature</span>
            <span class="k-pill k-pill--ghost">°F</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-drop"></i></span>
            <span class="k-habit-row__name">Water</span>
            <span class="k-pill k-pill--ghost">oz</span>
          </div>
        </div>
      </section>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-3);">
          <span class="k-eyebrow">Notifications</span>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
            <span class="k-habit-row__name">Workout reminders</span>
            <span class="k-checkbox is-checked"><i class="ph ph-check"></i></span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--blue"><i class="ph ph-drop"></i></span>
            <span class="k-habit-row__name">Water nudges</span>
            <span class="k-checkbox is-checked"><i class="ph ph-check"></i></span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-moon"></i></span>
            <span class="k-habit-row__name">Wind-down</span>
            <span class="k-checkbox" aria-label="Toggle"></span>
          </div>
        </div>
      </section>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-3);">
          <span class="k-eyebrow">Appearance</span>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-moon"></i></span>
            <span class="k-habit-row__name">Theme</span>
            <span class="k-pill k-pill--ghost">Dark</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-clock"></i></span>
            <span class="k-habit-row__name">Week starts</span>
            <span class="k-pill k-pill--ghost">Mon</span>
          </div>
        </div>
      </section>

      <section class="k-card">
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-info"></i></span>
            <span class="k-habit-row__name">About</span>
            <span class="k-text-faint">v0.1</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile"><i class="ph ph-file-text"></i></span>
            <span class="k-habit-row__name">Terms &amp; Privacy</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </div>
        </div>
      </section>

    </div>

    <nav class="k-nav" aria-label="Primary">
      <button class="k-nav__btn" aria-label="Home"><i class="ph ph-house"></i></button>
      <button class="k-nav__btn" aria-label="Plan"><i class="ph ph-calendar-blank"></i></button>
      <button class="k-nav__btn" aria-label="Habits"><i class="ph ph-check-square"></i></button>
      <button class="k-nav__btn" aria-current="page" aria-label="Settings"><i class="ph ph-gear-six"></i></button>
    </nav>
  </main>
  <script src="./_nav.js"></script>
</body>
</html>
