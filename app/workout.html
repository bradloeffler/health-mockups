<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Workout</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll">

      <header class="k-row k-row--between">
        <button class="k-icon-tile k-icon-tile--sm" aria-label="Close"><i class="ph ph-x"></i></button>
        <div class="k-stack k-stack--tight" style="align-items: center;">
          <span class="k-text-body" style="font-weight: 500;">Push A</span>
          <span class="k-eyebrow">12:36 elapsed</span>
        </div>
        <button class="k-icon-tile k-icon-tile--sm" aria-label="Pause"><i class="ph ph-pause"></i></button>
      </header>

      <section class="k-card k-card--accent">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-2);">
          <span class="k-eyebrow">Now · Set 2 of 4</span>
          <span class="k-pill k-pill--amber">Working</span>
        </div>
        <div class="k-stack" style="--gap: var(--s-1); margin-bottom: var(--s-3);">
          <span class="k-text-title">Bench press</span>
          <span class="k-text-sub">8 reps &middot; 185 lb</span>
        </div>
        <div class="k-row k-row--between">
          <button class="k-step-btn" aria-label="Decrement"><i class="ph ph-minus"></i></button>
          <span class="k-numeric k-numeric--xl"><span class="k-numeric__val">185</span><span class="k-numeric__unit">lb</span></span>
          <button class="k-step-btn" aria-label="Increment"><i class="ph ph-plus"></i></button>
        </div>
        <div class="k-row k-row--between" style="margin-top: var(--s-3);">
          <span class="k-text-faint">2:00 rest</span>
          <button class="k-pill k-pill--amber"><i class="ph ph-check"></i> Log set</button>
        </div>
      </section>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-3);">
          <span class="k-eyebrow">Sets &middot; bench press</span>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row k-habit-row--done">
            <span class="k-icon-tile k-icon-tile--sm k-icon-tile--amber"><i class="ph ph-check"></i></span>
            <span class="k-habit-row__name">Set 1</span>
            <span class="k-habit-row__trail">8 × 185</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--sm"><i class="ph ph-record-fill"></i></span>
            <span class="k-habit-row__name">Set 2</span>
            <span class="k-habit-row__trail">— × 185</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--sm"><i class="ph ph-minus"></i></span>
            <span class="k-habit-row__name">Set 3</span>
            <span class="k-habit-row__trail">— × 185</span>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--sm"><i class="ph ph-minus"></i></span>
            <span class="k-habit-row__name">Set 4</span>
            <span class="k-habit-row__trail">— × 185</span>
          </div>
        </div>
      </section>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-3);">
          <span class="k-eyebrow">Up next</span>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">OHP</span>
              <span class="k-text-faint">4 × 8 &middot; 115 lb</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">Dips</span>
              <span class="k-text-faint">3 × 10 &middot; bw + 25</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">Triceps rope</span>
              <span class="k-text-faint">3 × 12 &middot; 50 lb</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </div>
        </div>
      </section>

      <section class="k-card k-card--quiet" style="text-align: center;">
        <button class="k-pill k-pill--ghost" style="height: calc(var(--s-6) + var(--s-0)); padding: 0 var(--s-4);">End workout</button>
      </section>

    </div>
  </main>
  <script src="./_nav.js"></script>
</body>
</html>
