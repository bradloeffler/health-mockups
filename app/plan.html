<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Plan</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll">

      <header class="k-row k-row--between">
        <span class="k-text-body" style="font-weight: 500;">Plan</span>
        <button class="k-icon-tile" aria-label="Account"><i class="ph ph-user-circle"></i></button>
      </header>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-3);">
          <span class="k-eyebrow">Phase &middot; week 3 of 6</span>
          <span class="k-pill k-pill--amber">Hypertrophy</span>
        </div>
        <div class="k-progress" style="--p-pct: 50; --p-color: var(--c-amber);"></div>
      </section>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-3);">
          <span class="k-eyebrow">This week</span>
          <span class="k-text-faint">Jun 16 – 22</span>
        </div>
        <div class="k-row" style="gap: var(--s-1); justify-content: space-between;">
          <div class="k-stack k-stack--tight" style="align-items: center; flex: 1;">
            <span class="k-eyebrow">Mon</span>
            <span class="k-icon-tile k-icon-tile--sm k-icon-tile--amber"><i class="ph ph-check"></i></span>
          </div>
          <div class="k-stack k-stack--tight" style="align-items: center; flex: 1;">
            <span class="k-eyebrow">Tue</span>
            <span class="k-icon-tile k-icon-tile--sm k-icon-tile--amber"><i class="ph ph-check"></i></span>
          </div>
          <div class="k-stack k-stack--tight" style="align-items: center; flex: 1;">
            <span class="k-eyebrow">Wed</span>
            <span class="k-icon-tile k-icon-tile--sm"><i class="ph ph-minus"></i></span>
          </div>
          <div class="k-stack k-stack--tight" style="align-items: center; flex: 1;">
            <span class="k-eyebrow">Thu</span>
            <span class="k-icon-tile k-icon-tile--sm k-icon-tile--amber"><i class="ph ph-check"></i></span>
          </div>
          <div class="k-stack k-stack--tight" style="align-items: center; flex: 1;">
            <span class="k-eyebrow">Fri</span>
            <span class="k-icon-tile k-icon-tile--sm k-icon-tile--amber"><i class="ph ph-check"></i></span>
          </div>
          <div class="k-stack k-stack--tight" style="align-items: center; flex: 1;">
            <span class="k-eyebrow" style="color: var(--c-amber);">Sat</span>
            <span class="k-icon-tile k-icon-tile--sm k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
          </div>
          <div class="k-stack k-stack--tight" style="align-items: center; flex: 1;">
            <span class="k-eyebrow">Sun</span>
            <span class="k-icon-tile k-icon-tile--sm"><i class="ph ph-minus"></i></span>
          </div>
        </div>
      </section>

      <section class="k-card k-card--accent">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-2);">
          <span class="k-eyebrow">Today</span>
          <span class="k-text-faint">~ 55 min</span>
        </div>
        <div class="k-stack" style="--gap: var(--s-1); margin-bottom: var(--s-3);">
          <span class="k-text-title">Push A</span>
          <span class="k-text-sub">Bench &middot; OHP &middot; Dips &middot; Triceps</span>
        </div>
        <button class="k-pill k-pill--amber" style="height: calc(var(--s-6) + var(--s-0)); padding: 0 var(--s-4);">
          <i class="ph ph-play"></i> Start workout
        </button>
      </section>

      <section class="k-card">
        <div class="k-row k-row--between" style="margin-bottom: var(--s-3);">
          <span class="k-eyebrow">Upcoming</span>
        </div>
        <div class="k-stack" style="--gap: 0;">
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">Pull A</span>
              <span class="k-text-faint">Sun &middot; ~ 50 min</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">Legs B</span>
              <span class="k-text-faint">Mon &middot; ~ 60 min</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </div>
          <div class="k-habit-row">
            <span class="k-icon-tile k-icon-tile--blue"><i class="ph ph-person-simple-run"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">Zone 2 · 30 min</span>
              <span class="k-text-faint">Tue &middot; easy</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </div>
        </div>
      </section>

    </div>

    <nav class="k-nav" aria-label="Primary">
      <button class="k-nav__btn" aria-label="Home"><i class="ph ph-house"></i></button>
      <button class="k-nav__btn" aria-current="page" aria-label="Plan"><i class="ph ph-calendar-blank"></i></button>
      <button class="k-nav__btn" aria-label="Habits"><i class="ph ph-check-square"></i></button>
      <button class="k-nav__btn" aria-label="Settings"><i class="ph ph-gear-six"></i></button>
    </nav>
  </main>
  <script src="./_nav.js"></script>
</body>
</html>
