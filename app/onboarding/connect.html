<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Connect</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll" style="justify-content: space-between;">

      <div class="k-stack" style="--gap: var(--s-4);">

        <header class="k-row k-row--between">
          <button class="k-icon-tile k-icon-tile--sm" aria-label="Back"><i class="ph ph-caret-left"></i></button>
          <span class="k-eyebrow">Step 3 of 6</span>
          <span class="k-icon-tile k-icon-tile--sm" style="visibility: hidden;"></span>
        </header>

        <div class="k-stack" style="--gap: var(--s-2);">
          <span class="k-text-title">Connect a source</span>
          <span class="k-text-sub">Pick one to start. Add more later.</span>
        </div>

        <div class="k-stack" style="--gap: var(--s-2);">

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <img src="../../kit/brands/apple-health.svg" width="36" height="36" alt="Apple Health" />
            <div class="k-stack k-stack--tight" style="flex: 1; min-width: 0;">
              <span class="k-text-body" style="font-weight: 500;">Apple Health</span>
              <span class="k-text-faint">Steps, heart rate, sleep, workouts</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </button>

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <img src="../../kit/brands/whoop.svg" width="36" height="36" alt="Whoop" />
            <div class="k-stack k-stack--tight" style="flex: 1; min-width: 0;">
              <span class="k-text-body" style="font-weight: 500;">Whoop</span>
              <span class="k-text-faint">Recovery, strain, HRV, sleep</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </button>

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <img src="../../kit/brands/oura.svg" width="36" height="36" alt="Oura" />
            <div class="k-stack k-stack--tight" style="flex: 1; min-width: 0;">
              <span class="k-text-body" style="font-weight: 500;">Oura</span>
              <span class="k-text-faint">Readiness, sleep, temperature</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </button>

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <img src="../../kit/brands/garmin.svg" width="36" height="36" alt="Garmin" />
            <div class="k-stack k-stack--tight" style="flex: 1; min-width: 0;">
              <span class="k-text-body" style="font-weight: 500;">Garmin</span>
              <span class="k-text-faint">Workouts, GPS, daily stats</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </button>

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <img src="../../kit/brands/fitbit.svg" width="36" height="36" alt="Fitbit" />
            <div class="k-stack k-stack--tight" style="flex: 1; min-width: 0;">
              <span class="k-text-body" style="font-weight: 500;">Fitbit</span>
              <span class="k-text-faint">Steps, sleep, heart rate</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </button>

        </div>

      </div>

      <div class="k-stack" style="--gap: var(--s-2);">
        <button class="k-pill k-pill--amber" style="height: calc(var(--s-7) + var(--s-1)); padding: 0 var(--s-4); justify-content: center;">
          Continue
        </button>
        <div class="k-row" style="justify-content: center;">
          <button class="k-pill k-pill--ghost" style="height: var(--s-6);">Skip for now</button>
        </div>
      </div>

    </div>
  </main>
  <script src="../_nav.js"></script>
</body>
</html>
