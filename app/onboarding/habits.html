<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Pick your habits</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../../kit/kit.css" />
  <link rel="stylesheet" href="./_onboarding.css" />
</head>
<body>
  <main class="k-screen ob-screen">
    <div class="ob-scroll">

      <header class="ob-top">
        <span class="ob-word">
          <span class="ob-word__mark">F</span>
          <span>FORGE</span>
        </span>
        <span class="k-pill k-pill--ghost">Step 3 of 4</span>
      </header>

      <section class="ob-intro">
        <span class="ob-eyebrow">Step 3 of 4</span>
        <h1 class="ob-h1 ob-h1--display">Pick your <strong>habits</strong></h1>
        <p class="ob-lede">Forge helps you track compliance to habits that are important to you. You can change these later.</p>
      </section>

      <section class="ob-habits" id="habits">

        <button type="button" class="ob-habit is-selected" data-habit="vitaminsAM">
          <span class="k-icon-tile"><i class="ph" id="ic-vitaminsAM"></i></span>
          <span class="ob-habit__name">AM vitamins</span>
          <span class="ob-habit__tick"><i class="ph ph-check"></i></span>
        </button>

        <button type="button" class="ob-habit is-selected" data-habit="vitaminsPM">
          <span class="k-icon-tile"><i class="ph" id="ic-vitaminsPM"></i></span>
          <span class="ob-habit__name">PM vitamins</span>
          <span class="ob-habit__tick"><i class="ph ph-check"></i></span>
        </button>

        <button type="button" class="ob-habit is-selected" data-habit="water">
          <span class="k-icon-tile"><i class="ph" id="ic-water"></i></span>
          <span class="ob-habit__name">Water</span>
          <span class="ob-habit__tick"><i class="ph ph-check"></i></span>
        </button>

        <button type="button" class="ob-habit is-selected" data-habit="steps">
          <span class="k-icon-tile"><i class="ph" id="ic-steps"></i></span>
          <span class="ob-habit__name">Steps</span>
          <span class="ob-habit__tick"><i class="ph ph-check"></i></span>
        </button>

        <button type="button" class="ob-habit" data-habit="mobility">
          <span class="k-icon-tile"><i class="ph" id="ic-mobility"></i></span>
          <span class="ob-habit__name">Mobility</span>
          <span class="ob-habit__tick"><i class="ph ph-check"></i></span>
        </button>

        <button type="button" class="ob-habit" data-habit="workout">
          <span class="k-icon-tile"><i class="ph" id="ic-workout"></i></span>
          <span class="ob-habit__name">Workout</span>
          <span class="ob-habit__tick"><i class="ph ph-check"></i></span>
        </button>

        <button type="button" class="ob-habit" data-habit="protein">
          <span class="k-icon-tile"><i class="ph" id="ic-protein"></i></span>
          <span class="ob-habit__name">Protein</span>
          <span class="ob-habit__tick"><i class="ph ph-check"></i></span>
        </button>

        <button type="button" class="ob-habit" data-habit="stretch">
          <span class="k-icon-tile"><i class="ph" id="ic-stretch"></i></span>
          <span class="ob-habit__name">Stretch</span>
          <span class="ob-habit__tick"><i class="ph ph-check"></i></span>
        </button>

        <button type="button" class="ob-habit-add">
          <i class="ph ph-plus"></i> Add custom habit
        </button>

      </section>

      <div class="ob-continue">
        <div class="ob-continue__row">
          <a class="ob-btn ob-btn--ghost" href="./plan.html">Skip for now</a>
          <a class="ob-btn ob-btn--primary" href="./plan.html"><i class="ph ph-play"></i> Continue</a>
        </div>
      </div>

    </div>
  </main>

  <script type="module">
    import { icons } from '../../kit/icons.js';
    const need = ['vitaminsAM','vitaminsPM','water','steps','mobility','workout','protein','stretch'];
    need.forEach(name => {
      const el = document.getElementById('ic-' + name);
      if (el) el.className = 'ph ' + icons[name];
    });
  </script>

  <script>
    document.querySelectorAll('.ob-habit').forEach(btn => {
      btn.addEventListener('click', () => btn.classList.toggle('is-selected'));
    });
    (function () {
      const top = document.querySelector('.ob-top');
      window.addEventListener('scroll', () => {
        if (top) top.classList.toggle('is-faded', window.scrollY > 24);
      }, { passive: true });
    })();
  </script>
  <script src="../_nav.js"></script>
</body>
</html>
