<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Pick habits</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll" style="justify-content: space-between;">

      <div class="k-stack" style="--gap: var(--s-4);">

        <header class="k-row k-row--between">
          <button class="k-icon-tile k-icon-tile--sm" aria-label="Back"><i class="ph ph-caret-left"></i></button>
          <span class="k-eyebrow">Step 4 of 6</span>
          <span class="k-icon-tile k-icon-tile--sm" style="visibility: hidden;"></span>
        </header>

        <div class="k-stack" style="--gap: var(--s-2);">
          <span class="k-text-title" style="font-size: var(--t-num-lg);">Pick a few habits</span>
          <span class="k-text-sub">Three is plenty. You can edit later.</span>
        </div>

        <section class="k-card">
          <div class="k-stack" style="--gap: 0;">
            <div class="k-habit-row">
              <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-sun"></i></span>
              <span class="k-habit-row__name">Vitamins AM</span>
              <span class="k-checkbox is-checked"><i class="ph ph-check"></i></span>
            </div>
            <div class="k-habit-row">
              <span class="k-icon-tile k-icon-tile--blue"><i class="ph ph-person-simple-tai-chi"></i></span>
              <span class="k-habit-row__name">Stretch 10 min</span>
              <span class="k-checkbox is-checked"><i class="ph ph-check"></i></span>
            </div>
            <div class="k-habit-row">
              <span class="k-icon-tile k-icon-tile--green"><i class="ph ph-drop"></i></span>
              <span class="k-habit-row__name">Hydration</span>
              <span class="k-checkbox is-checked"><i class="ph ph-check"></i></span>
            </div>
            <div class="k-habit-row">
              <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-moon-stars"></i></span>
              <span class="k-habit-row__name">Vitamins PM</span>
              <span class="k-checkbox" aria-label="Toggle"></span>
            </div>
            <div class="k-habit-row">
              <span class="k-icon-tile"><i class="ph ph-book-open"></i></span>
              <span class="k-habit-row__name">Read 20 min</span>
              <span class="k-checkbox" aria-label="Toggle"></span>
            </div>
            <div class="k-habit-row">
              <span class="k-icon-tile"><i class="ph ph-moon"></i></span>
              <span class="k-habit-row__name">In bed by 10:30</span>
              <span class="k-checkbox" aria-label="Toggle"></span>
            </div>
            <div class="k-habit-row">
              <span class="k-icon-tile"><i class="ph ph-leaf"></i></span>
              <span class="k-habit-row__name">No alcohol</span>
              <span class="k-checkbox" aria-label="Toggle"></span>
            </div>
          </div>
        </section>

        <button class="k-pill k-pill--ghost" style="height: calc(var(--s-6) + var(--s-0)); padding: 0 var(--s-3); align-self: flex-start;">
          <i class="ph ph-plus"></i> Custom
        </button>

      </div>

      <button class="k-pill k-pill--amber" style="height: calc(var(--s-7) + var(--s-1)); padding: 0 var(--s-4); justify-content: center;">
        Continue
      </button>

    </div>
  </main>
  <script src="../_nav.js"></script>
</body>
</html>
