<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Welcome</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../../kit/kit.css" />
  <link rel="stylesheet" href="./_onboarding.css" />
</head>
<body>
  <main class="k-screen ob-screen">
    <div class="ob-scroll">

      <header class="ob-top">
        <span class="ob-word">
          <span class="ob-word__mark">F</span>
          <span>FORGE</span>
        </span>
        <span class="k-pill k-pill--ghost">v0.1</span>
      </header>

      <section class="ob-brand">
        <div class="ob-tach" aria-hidden="true">
          <div class="ob-tach__ring">
            <svg class="k-ring__svg" viewBox="0 0 100 100" aria-hidden="true">
              <circle class="k-ring__track" cx="50" cy="50" r="46" fill="none" stroke-width="7"/>
              <circle class="k-ring__bar"   cx="50" cy="50" r="46" fill="none" stroke-width="7" pathLength="100" style="stroke-dashoffset: 22;"/>
            </svg>
            <div class="ob-tach__mark">F</div>
          </div>
        </div>
        <div class="ob-wordmark">FOR<span class="ob-wordmark__bold">GE</span></div>
        <h1 class="ob-h1">Welcome to FORGE</h1>
        <p class="ob-lede">Recovery, training, and habits. One atomic record a day.</p>
      </section>

      <div class="ob-btns">
        <a class="ob-btn ob-btn--dark" href="./connect.html">
          <i class="ph ph-apple-logo"></i> Sign in with Apple
        </a>
        <a class="ob-btn ob-btn--light" href="./connect.html">
          <i class="ph ph-google-logo"></i> Sign in with Google
        </a>
        <a class="ob-btn ob-btn--ghost" href="./signup.html">
          <i class="ph ph-envelope-simple"></i> Sign up with email
        </a>
      </div>

      <p class="ob-legal">By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy</a>.</p>

    </div>
  </main>
  <script src="../_nav.js"></script>
</body>
</html>
