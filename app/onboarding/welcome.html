<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Welcome</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll" style="justify-content: space-between;">

      <div></div>

      <div class="k-stack" style="--gap: var(--s-5); align-items: center; text-align: center;">
        <img src="../../kit/brands/forge.svg" width="96" height="96" alt="FORGE" />

        <div class="k-stack" style="--gap: var(--s-2); align-items: center;">
          <span class="k-text-title">FORGE</span>
          <span class="k-text-sub">Train. Recover. Repeat.</span>
        </div>
      </div>

      <div class="k-stack" style="--gap: var(--s-2);">
        <button class="k-pill k-pill--amber" style="height: calc(var(--s-7) + var(--s-1)); padding: 0 var(--s-4); justify-content: center;">
          Get started
        </button>
        <div class="k-row" style="justify-content: center;">
          <button class="k-pill k-pill--ghost" style="height: var(--s-6);">I have an account</button>
        </div>
      </div>

    </div>
  </main>
  <script src="../_nav.js"></script>
</body>
</html>
