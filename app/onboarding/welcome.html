<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE — Welcome</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../../kit/kit.css" />
  <style>
    /* ---- onboarding shared chrome (tokens only) ---- */
    .ob-screen {
      background:
        radial-gradient(120% 70% at 50% -10%, rgba(227,168,87,0.10), transparent 60%),
        radial-gradient(80% 60% at 50% 110%, rgba(227,168,87,0.06), transparent 60%),
        linear-gradient(180deg, #1b1813 0%, var(--c-bg) 28%, var(--c-deep) 100%);
    }
    .ob-screen::before {
      content: '';
      position: absolute;
      inset: -10% -10% auto -10%;
      height: 60%;
      background: radial-gradient(50% 50% at 50% 50%, rgba(227,168,87,0.10), transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: ob-drift 14s ease-in-out infinite alternate;
    }
    @keyframes ob-drift {
      from { transform: translate3d(-3%, -2%, 0); opacity: 0.85; }
      to   { transform: translate3d(3%, 2%, 0);   opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .ob-screen::before { animation: none; }
    }

    .ob-scroll {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      padding:
        calc(env(safe-area-inset-top, 0px) + var(--s-3))
        var(--s-4)
        calc(env(safe-area-inset-bottom, 0px) + var(--s-4))
        var(--s-4);
      gap: var(--s-4);
    }

    .ob-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--s-2);
      min-height: 24px;
    }
    .ob-word {
      display: inline-flex;
      align-items: center;
      gap: var(--s-1);
      font-family: var(--f-mono);
      font-size: var(--t-eyebrow-size);
      font-weight: var(--t-eyebrow-weight);
      letter-spacing: var(--t-eyebrow-track);
      text-transform: uppercase;
      color: var(--c-ink);
    }
    .ob-word .ob-word__mark {
      width: 18px; height: 18px;
      border-radius: var(--r-sm);
      background: var(--c-amber);
      color: var(--c-on-amber);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
      box-shadow: 0 0 0 1px rgba(243,195,120,0.25), 0 1px 0 rgba(255,255,255,0.10) inset;
    }
    .ob-word .dim { color: var(--c-faint); }

    /* ---- brand hero ---- */
    .ob-brand {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: var(--s-3);
      padding: var(--s-6) 0;
    }
    .ob-tach {
      position: relative;
      width: 132px;
      height: 132px;
      border-radius: var(--r-pill);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(60% 60% at 50% 40%, rgba(227,168,87,0.16), transparent 70%);
      box-shadow: 0 0 60px rgba(227,168,87,0.25);
    }
    .ob-tach__mark {
      width: 74px;
      height: 74px;
      border-radius: var(--r-pill);
      background: linear-gradient(180deg, rgba(243,195,120,0.95), var(--c-amber));
      color: var(--c-on-amber);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--f-mono);
      font-weight: 700;
      font-size: 36px;
      letter-spacing: 0.04em;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.5),
        inset 0 -3px 6px rgba(120,70,10,0.35),
        0 12px 36px rgba(227,168,87,0.45);
    }
    .ob-wordmark {
      font-family: var(--f-ui);
      font-size: 38px;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: var(--c-ink);
      padding-left: 0.22em;
      line-height: 1;
    }
    .ob-wordmark .ob-wordmark__bold { font-weight: 700; }
    .ob-h1 {
      font-family: var(--f-ui);
      font-size: 30px;
      font-weight: 500;
      letter-spacing: -0.4px;
      color: var(--c-ink);
      margin: 0;
      line-height: 1.05;
    }
    .ob-lede {
      font-family: var(--f-ui);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--c-sub);
      max-width: 32ch;
      margin: 0;
    }

    /* ---- big buttons ---- */
    .ob-btns {
      display: flex;
      flex-direction: column;
      gap: var(--s-2);
      width: 100%;
    }
    .ob-btn {
      width: 100%;
      min-height: 52px;
      border-radius: var(--r-lg);
      padding: 0 var(--s-4);
      font-family: var(--f-ui);
      font-size: 16px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--s-2);
      border: 1px solid var(--c-hair-strong);
      background: var(--c-surface);
      color: var(--c-ink);
      transition: transform var(--m-fast), background var(--m-fast), border-color var(--m-fast), box-shadow var(--m-fast);
      text-decoration: none;
    }
    .ob-btn:active { transform: translateY(1px) scale(0.992); }
    .ob-btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(227,168,87,0.35);
    }
    .ob-btn--primary {
      color: var(--c-on-amber);
      border: none;
      background: linear-gradient(180deg, var(--c-amber-bright), var(--c-amber));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.5),
        inset 0 -2px 4px rgba(120,70,10,0.3),
        0 8px 24px rgba(227,168,87,0.35);
    }
    .ob-btn--dark {
      background: #000;
      color: #fff;
      border-color: var(--c-hair-strong);
    }
    .ob-btn--light {
      background: #fff;
      color: #161616;
      border-color: transparent;
    }
    .ob-btn--ghost {
      background: transparent;
      color: var(--c-sub);
      border: 1px solid var(--c-hair-strong);
    }
    .ob-btn .ph { font-size: 18px; }

    .ob-legal {
      font-family: var(--f-mono);
      font-size: var(--t-eyebrow-size);
      letter-spacing: 0.04em;
      color: var(--c-faint);
      text-align: center;
      line-height: 1.5;
      margin-top: var(--s-3);
      padding: 0 var(--s-4);
    }
    .ob-legal a { color: var(--c-sub); text-decoration: underline; }

    /* entrance stagger */
    @media (prefers-reduced-motion: no-preference) {
      .ob-top,
      .ob-brand,
      .ob-btns,
      .ob-legal {
        animation: ob-rise var(--m-slow) cubic-bezier(0.2, 0.0, 0.2, 1) both;
      }
      .ob-brand { animation-delay: 60ms; }
      .ob-btns { animation-delay: 140ms; }
      .ob-legal { animation-delay: 220ms; }
    }
    @keyframes ob-rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="k-screen ob-screen">
    <div class="ob-scroll">

      <header class="ob-top">
        <span class="ob-word">
          <span class="ob-word__mark">F</span>
          <span>FORGE</span>
        </span>
        <span class="k-pill k-pill--ghost">v0.1</span>
      </header>

      <section class="ob-brand">
        <div class="ob-tach" aria-hidden="true">
          <div class="ob-tach__mark">F</div>
        </div>
        <div class="ob-wordmark">FOR<span class="ob-wordmark__bold">GE</span></div>
        <h1 class="ob-h1">Welcome to FORGE</h1>
        <p class="ob-lede">Recovery, training, and habits. One atomic record a day.</p>
      </section>

      <div class="ob-btns">
        <a class="ob-btn ob-btn--dark" href="./connect.html">
          <i class="ph ph-apple-logo"></i> Sign in with Apple
        </a>
        <a class="ob-btn ob-btn--light" href="./connect.html">
          <i class="ph ph-google-logo"></i> Sign in with Google
        </a>
        <a class="ob-btn ob-btn--ghost" href="./signup.html">
          <i class="ph ph-envelope-simple"></i> Sign up with email
        </a>
      </div>

      <p class="ob-legal">By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy</a>.</p>

    </div>
  </main>
</body>
</html>
