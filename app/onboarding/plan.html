<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Pick a plan</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll" style="justify-content: space-between;">

      <div class="k-stack" style="--gap: var(--s-4);">

        <header class="k-row k-row--between">
          <button class="k-icon-tile k-icon-tile--sm" aria-label="Back"><i class="ph ph-caret-left"></i></button>
          <span class="k-eyebrow">Step 5 of 6</span>
          <span class="k-icon-tile k-icon-tile--sm" style="visibility: hidden;"></span>
        </header>

        <div class="k-stack" style="--gap: var(--s-2);">
          <span class="k-text-title" style="font-size: var(--t-num-lg);">Pick a phase</span>
          <span class="k-text-sub">Six weeks. We'll regenerate after.</span>
        </div>

        <div class="k-stack" style="--gap: var(--s-2);">

          <button class="k-card k-card--accent" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
            <div class="k-stack k-stack--tight" style="flex: 1; min-width: 0;">
              <span class="k-text-body" style="font-weight: 500;">Hypertrophy</span>
              <span class="k-text-faint">4 days &middot; ~ 55 min</span>
            </div>
            <span class="k-checkbox is-checked"><i class="ph ph-check"></i></span>
          </button>

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <span class="k-icon-tile"><i class="ph ph-lightning"></i></span>
            <div class="k-stack k-stack--tight" style="flex: 1; min-width: 0;">
              <span class="k-text-body" style="font-weight: 500;">Strength</span>
              <span class="k-text-faint">3 days &middot; ~ 70 min</span>
            </div>
            <span class="k-checkbox" aria-label="Toggle"></span>
          </button>

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <span class="k-icon-tile"><i class="ph ph-person-simple-run"></i></span>
            <div class="k-stack k-stack--tight" style="flex: 1; min-width: 0;">
              <span class="k-text-body" style="font-weight: 500;">Endurance</span>
              <span class="k-text-faint">5 days &middot; ~ 45 min</span>
            </div>
            <span class="k-checkbox" aria-label="Toggle"></span>
          </button>

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <span class="k-icon-tile"><i class="ph ph-heart"></i></span>
            <div class="k-stack k-stack--tight" style="flex: 1; min-width: 0;">
              <span class="k-text-body" style="font-weight: 500;">Recovery</span>
              <span class="k-text-faint">3 days &middot; ~ 30 min</span>
            </div>
            <span class="k-checkbox" aria-label="Toggle"></span>
          </button>

        </div>

      </div>

      <button class="k-pill k-pill--amber" style="height: calc(var(--s-7) + var(--s-1)); padding: 0 var(--s-4); justify-content: center;">
        Continue
      </button>

    </div>
  </main>
  <script src="../_nav.js"></script>
</body>
</html>
