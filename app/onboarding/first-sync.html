<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Syncing</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll" style="justify-content: space-between;">

      <header class="k-row k-row--between">
        <span class="k-icon-tile k-icon-tile--sm" style="visibility: hidden;"></span>
        <span class="k-eyebrow">Step 6 of 6</span>
        <span class="k-icon-tile k-icon-tile--sm" style="visibility: hidden;"></span>
      </header>

      <div class="k-stack" style="--gap: var(--s-5); align-items: center; text-align: center;">

        <div class="k-ring" style="--ring-color: var(--c-amber); --ring-pct: 64; --ring-size: calc(var(--s-8) * 2 + var(--s-3));">
          <svg class="k-ring__svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="k-ring__track" cx="50" cy="50" r="46" fill="none" stroke-width="6"/>
            <circle class="k-ring__bar" cx="50" cy="50" r="46" fill="none" stroke-width="6" pathLength="100"/>
          </svg>
          <div class="k-ring__num">64</div>
          <div class="k-ring__label">%</div>
        </div>

        <div class="k-stack" style="--gap: var(--s-2);">
          <span class="k-text-title" style="font-size: var(--t-num-lg);">Pulling your history</span>
          <span class="k-text-sub">90 days of recovery, workouts and sleep.</span>
        </div>

        <div class="k-stack" style="--gap: var(--s-1); width: 100%;">
          <div class="k-row k-row--between" style="padding: 0 var(--s-2);">
            <span class="k-eyebrow"><i class="ph ph-check" style="color: var(--c-green);"></i> Recovery</span>
            <span class="k-text-faint">90 / 90</span>
          </div>
          <div class="k-row k-row--between" style="padding: 0 var(--s-2);">
            <span class="k-eyebrow"><i class="ph ph-check" style="color: var(--c-green);"></i> Sleep</span>
            <span class="k-text-faint">90 / 90</span>
          </div>
          <div class="k-row k-row--between" style="padding: 0 var(--s-2);">
            <span class="k-eyebrow" style="color: var(--c-amber);"><i class="ph ph-arrow-clockwise"></i> Workouts</span>
            <span class="k-text-faint">57 / 90</span>
          </div>
          <div class="k-row k-row--between" style="padding: 0 var(--s-2);">
            <span class="k-eyebrow">Habits</span>
            <span class="k-text-faint">waiting</span>
          </div>
        </div>

      </div>

      <span class="k-text-faint" style="text-align: center; padding: 0 var(--s-3);">
        Hang tight. This screen is one-time only.
      </span>

    </div>
  </main>
  <script src="../_nav.js"></script>
</body>
</html>
