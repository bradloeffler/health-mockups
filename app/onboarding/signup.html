<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Sign in</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll" style="justify-content: space-between;">

      <header class="k-row k-row--between">
        <button class="k-icon-tile k-icon-tile--sm" aria-label="Back"><i class="ph ph-caret-left"></i></button>
        <span class="k-eyebrow">Step 2 of 6</span>
        <span class="k-icon-tile k-icon-tile--sm" style="visibility: hidden;"></span>
      </header>

      <div class="k-stack" style="--gap: var(--s-5);">
        <div class="k-stack" style="--gap: var(--s-2);">
          <span class="k-text-title">Sign in</span>
          <span class="k-text-sub">Pick a method to continue.</span>
        </div>

        <div class="k-stack" style="--gap: var(--s-2);">

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <img src="../../kit/brands/apple.svg" width="36" height="36" alt="Apple" />
            <span class="k-text-body" style="flex: 1; font-weight: 500;">Continue with Apple</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </button>

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <img src="../../kit/brands/google.svg" width="36" height="36" alt="Google" />
            <span class="k-text-body" style="flex: 1; font-weight: 500;">Continue with Google</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </button>

          <button class="k-card" style="display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); cursor: pointer; text-align: left;">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-envelope-simple"></i></span>
            <span class="k-text-body" style="flex: 1; font-weight: 500;">Continue with email</span>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </button>

        </div>

        <div class="k-row" style="justify-content: center; gap: var(--s-1);">
          <span class="k-text-faint">Already have an account?</span>
          <button class="k-text-body" style="background: none; border: 0; color: var(--c-amber); font-weight: 500; cursor: pointer; padding: 0;">Sign in</button>
        </div>
      </div>

      <span class="k-text-faint" style="text-align: center; padding: 0 var(--s-3);">
        Tap continue to agree to the Terms and Privacy Policy.
      </span>

    </div>
  </main>
  <script src="../_nav.js"></script>
</body>
</html>
