<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FORGE · Onboarding</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="../../kit/kit.css" />
</head>
<body>
  <main class="k-screen">
    <div class="k-screen__scroll">

      <header class="k-row k-row--between">
        <a href="../index.html" class="k-icon-tile k-icon-tile--sm" aria-label="Back" style="text-decoration: none;"><i class="ph ph-caret-left"></i></a>
        <span class="k-text-body" style="font-weight: 500;">Onboarding</span>
        <span class="k-icon-tile k-icon-tile--sm" style="visibility: hidden;"></span>
      </header>

      <section class="k-card k-card--quiet">
        <div class="k-stack" style="--gap: 0;">
          <a href="./welcome.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-hand-waving"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">Welcome</span>
              <span class="k-text-faint">Step 1</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
          <a href="./signup.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile"><i class="ph ph-user-plus"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">Sign in</span>
              <span class="k-text-faint">Step 2</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
          <a href="./connect.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--blue"><i class="ph ph-plugs-connected"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">Connect</span>
              <span class="k-text-faint">Step 3</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
          <a href="./habits.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--green"><i class="ph ph-check-square"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">Pick habits</span>
              <span class="k-text-faint">Step 4</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
          <a href="./plan.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile k-icon-tile--amber"><i class="ph ph-barbell"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">Pick a plan</span>
              <span class="k-text-faint">Step 5</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
          <a href="./first-sync.html" class="k-habit-row" style="text-decoration: none; color: inherit;">
            <span class="k-icon-tile"><i class="ph ph-cloud-arrow-down"></i></span>
            <div class="k-stack k-stack--tight" style="min-width: 0;">
              <span class="k-habit-row__name">First sync</span>
              <span class="k-text-faint">Step 6</span>
            </div>
            <i class="ph ph-caret-right" style="color: var(--c-faint); font-size: var(--t-num-sm);"></i>
          </a>
        </div>
      </section>

    </div>
  </main>
  <script src="../_nav.js"></script>
</body>
</html>
