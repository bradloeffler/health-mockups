<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORGE Onboarding</title>
<style>
  :root{
    --bg-grad: radial-gradient(125% 80% at 50% 16%, #16140f, #0d0c0a);
    --surface:#1a1814;
    --raised:#1f1c16;
    --hair:#201d17;
    --hair2:#2c281f;
    --ink:#efeae0;
    --sub:#a59d8d;
    --faint:#6f6859;
    --amber:#e3a857;
    --amber-bright:#f3c378;
    --green:#4fd17e;
    --ui:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Courier New",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:var(--ui);
    background:#08080a;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px 0;
  }

  /* phone frame */
  .phone{
    position:relative;
    width:430px;
    max-width:100%;
    height:900px;
    background:var(--bg-grad);
    border-radius:46px;
    overflow:hidden;
    box-shadow:0 40px 120px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.03) inset;
    display:flex;
    flex-direction:column;
  }
  @media (max-width:480px){
    body{padding:0;}
    .phone{border-radius:0;height:100vh;width:100%;}
  }

  /* top accent line / ember */
  .accent-line{
    position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent, rgba(227,168,87,.0) 8%, var(--amber) 50%, rgba(227,168,87,.0) 92%, transparent);
    opacity:.9;
    z-index:5;
  }

  .screen{
    flex:1;
    display:none;
    flex-direction:column;
    height:100%;
    overflow:hidden;
  }
  .screen.active{display:flex;}

  .scroll{
    flex:1;
    overflow-y:auto;
    padding:64px 26px 16px;
    -webkit-overflow-scrolling:touch;
  }
  .scroll::-webkit-scrollbar{width:0;}

  /* header block */
  .eyebrow{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:22px;
  }
  .eyebrow .lbl{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--amber);
    font-weight:600;
  }
  .dots{display:flex;gap:6px;align-items:center;}
  .dots i{
    width:7px;height:7px;border-radius:50%;
    background:var(--hair2);
    display:block;
    transition:all .3s;
  }
  .dots i.on{
    background:var(--amber);
    box-shadow:0 0 10px rgba(227,168,87,.55);
  }
  .dots i.wide{width:18px;border-radius:4px;}

  h1{
    font-size:32px;
    line-height:1.04;
    letter-spacing:-.02em;
    font-weight:700;
    color:var(--ink);
    margin-bottom:10px;
  }
  .sub{
    font-size:14.5px;
    line-height:1.5;
    color:var(--sub);
    max-width:36ch;
    margin-bottom:26px;
  }

  /* source cards */
  .cards{display:flex;flex-direction:column;gap:10px;}
  .card{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--surface);
    border:1px solid var(--hair);
    border-radius:16px;
    padding:13px 14px;
    transition:border-color .2s, background .2s, transform .08s;
  }
  .card:active{transform:scale(.992);}
  .card.connected{
    border-color:rgba(79,209,126,.28);
    background:linear-gradient(0deg, rgba(79,209,126,.04), rgba(79,209,126,.04)), var(--surface);
  }

  .tile{
    width:46px;height:46px;
    border-radius:13px;
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 4px 12px rgba(0,0,0,.25);
  }
  .tile svg{display:block;}

  .meta{flex:1;min-width:0;}
  .name{
    font-size:15px;
    font-weight:600;
    color:var(--ink);
    line-height:1.2;
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .desc{
    font-size:12.5px;
    color:var(--sub);
    line-height:1.3;
    margin-top:3px;
  }
  .pill{
    font-family:var(--mono);
    font-size:9px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--amber-bright);
    background:rgba(227,168,87,.12);
    border:1px solid rgba(227,168,87,.25);
    padding:2px 6px;
    border-radius:5px;
    font-weight:600;
    line-height:1;
  }

  /* connect button */
  .connect-btn{
    flex:0 0 auto;
    font-family:var(--ui);
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    background:var(--raised);
    border:1px solid var(--hair2);
    border-radius:10px;
    padding:8px 15px;
    cursor:pointer;
    display:flex;align-items:center;gap:6px;
    transition:all .2s;
    white-space:nowrap;
  }
  .connect-btn:hover{border-color:rgba(227,168,87,.4);color:var(--amber-bright);}
  .connect-btn.done{
    background:rgba(79,209,126,.1);
    border-color:rgba(79,209,126,.3);
    color:var(--green);
  }
  .connect-btn.done:hover{color:var(--green);}
  .connect-btn .chk{display:none;width:13px;height:13px;}
  .connect-btn.done .chk{display:block;}

  /* footer */
  .footer{
    flex:0 0 auto;
    padding:14px 26px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg, rgba(13,12,10,.96) 60%, rgba(13,12,10,0));
    border-top:1px solid var(--hair);
  }
  .btn-primary{
    width:100%;
    border:none;
    border-radius:15px;
    padding:16px;
    font-family:var(--ui);
    font-size:16px;
    font-weight:700;
    letter-spacing:.01em;
    color:#1a1206;
    background:linear-gradient(180deg, var(--amber-bright), var(--amber));
    cursor:pointer;
    box-shadow:0 8px 22px rgba(227,168,87,.22), 0 1px 0 rgba(255,255,255,.25) inset;
    transition:transform .08s, filter .2s;
  }
  .btn-primary:hover{filter:brightness(1.04);}
  .btn-primary:active{transform:scale(.985);}
  .skip{
    display:block;
    text-align:center;
    width:100%;
    background:none;border:none;
    color:var(--faint);
    font-family:var(--ui);
    font-size:13.5px;
    font-weight:500;
    padding:14px 0 2px;
    cursor:pointer;
    transition:color .2s;
  }
  .skip:hover{color:var(--sub);}

  /* ===== Habits screen ===== */
  .habit-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .habit{
    position:relative;
    background:var(--surface);
    border:1px solid var(--hair);
    border-radius:16px;
    padding:16px 14px;
    cursor:pointer;
    transition:border-color .18s, background .18s, transform .08s;
    min-height:104px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .habit:active{transform:scale(.985);}
  .habit .h-ico{
    width:38px;height:38px;border-radius:11px;
    background:var(--raised);
    border:1px solid var(--hair2);
    display:flex;align-items:center;justify-content:center;
    color:var(--sub);
    transition:all .18s;
  }
  .habit .h-ico svg{width:20px;height:20px;display:block;}
  .habit .h-name{
    font-size:14.5px;font-weight:600;color:var(--ink);
    margin-top:14px;line-height:1.2;
  }
  .habit .h-tick{
    position:absolute;top:13px;right:13px;
    width:22px;height:22px;border-radius:50%;
    border:1.5px solid var(--hair2);
    background:transparent;
    display:flex;align-items:center;justify-content:center;
    transition:all .18s;
  }
  .habit .h-tick svg{width:12px;height:12px;opacity:0;transform:scale(.5);transition:all .18s;}
  .habit.sel{
    border-color:rgba(227,168,87,.55);
    background:linear-gradient(180deg, rgba(227,168,87,.09), rgba(227,168,87,.03)), var(--surface);
  }
  .habit.sel .h-ico{
    background:linear-gradient(180deg, rgba(243,195,120,.18), rgba(227,168,87,.1));
    border-color:rgba(227,168,87,.4);
    color:var(--amber-bright);
  }
  .habit.sel .h-tick{
    border-color:var(--amber);
    background:linear-gradient(180deg, var(--amber-bright), var(--amber));
  }
  .habit.sel .h-tick svg{opacity:1;transform:scale(1);}

  .add-custom{
    grid-column:1 / -1;
    margin-top:2px;
    display:flex;align-items:center;justify-content:center;gap:9px;
    background:transparent;
    border:1.5px dashed var(--hair2);
    border-radius:16px;
    padding:16px;
    color:var(--sub);
    font-family:var(--ui);
    font-size:14px;font-weight:600;
    cursor:pointer;
    transition:all .18s;
  }
  .add-custom:hover{border-color:rgba(227,168,87,.45);color:var(--amber-bright);}
  .add-custom svg{width:16px;height:16px;}

  .count{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--faint);
    text-align:center;
    margin-bottom:12px;
  }
  .count b{color:var(--amber);font-weight:600;}

  /* toggle */
  .toggle{
    position:fixed;
    right:18px;bottom:18px;
    z-index:50;
    display:flex;
    background:rgba(26,24,20,.92);
    border:1px solid var(--hair2);
    border-radius:12px;
    padding:4px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,.5);
  }
  .toggle button{
    font-family:var(--mono);
    font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    font-weight:600;
    border:none;background:none;
    color:var(--faint);
    padding:7px 11px;border-radius:8px;
    cursor:pointer;transition:all .2s;
  }
  .toggle button.on{background:var(--amber);color:#1a1206;}
</style>
</head>
<body>

<div class="phone">
  <div class="accent-line"></div>

  <!-- ================= SCREEN 1: CONNECT ================= -->
  <section class="screen active" id="screen-connect">
    <div class="scroll">
      <div class="eyebrow">
        <span class="lbl">Step 1 of 3</span>
        <span class="dots"><i class="on wide"></i><i></i><i></i></span>
      </div>
      <h1>Connect your data</h1>
      <p class="sub">The more data sources you connect, the better your experience will be.</p>

      <div class="cards" id="source-cards">
        <!-- cards injected -->
      </div>
    </div>
    <div class="footer">
      <button class="btn-primary" onclick="go('habits')">Continue</button>
      <button class="skip" onclick="go('habits')">Skip for now</button>
    </div>
  </section>

  <!-- ================= SCREEN 2: HABITS ================= -->
  <section class="screen" id="screen-habits">
    <div class="scroll">
      <div class="eyebrow">
        <span class="lbl">Step 2 of 3</span>
        <span class="dots"><i></i><i class="on wide"></i><i></i></span>
      </div>
      <h1>Pick your habits</h1>
      <p class="sub">Forge helps you track compliance to habits that are important to you. Pick the ones you want to track. You can always change these later.</p>

      <div class="count"><b id="hcount">1</b> selected</div>

      <div class="habit-grid" id="habit-grid">
        <!-- habits injected -->
      </div>
    </div>
    <div class="footer">
      <button class="btn-primary" onclick="go('connect')">Continue</button>
    </div>
  </section>

  <div class="toggle">
    <button id="t-connect" class="on" onclick="go('connect')">Connect</button>
    <button id="t-habits" onclick="go('habits')">Habits</button>
  </div>
</div>

<script>
/* ---------- brand marks (inline svg) ---------- */
const heart = '<svg width="24" height="24" viewBox="0 0 24 24" fill="#ff3b30"><path d="M12 21s-7.5-4.9-9.7-9.2C.6 8.4 2 5 5.2 5c1.9 0 3.2 1.1 3.9 2.2.7-1.1 2-2.2 3.9-2.2C16.2 5 17.6 8.4 16 11.8 13.8 16.1 12 21 12 21z" transform="translate(-0.2 0)"/></svg>';

const whoop = '<svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="#fff" stroke-width="1.6"><circle cx="13" cy="13" r="4.2"/><circle cx="13" cy="13" r="8.2" opacity="0.55"/></svg>';

const oura = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4"><circle cx="12" cy="12" r="7"/></svg>';

const strava = '<svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M10.5 3 4 15.5h3.9L10.5 10l2.6 5.5H17L10.5 3z"/><path d="M13.1 15.5 11.4 19l-1.7-3.5H6.9L11.4 24l4.5-8.5h-2.8z" opacity="0.85"/></svg>';

const garmin = '<svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 3.5 4 20l8-4.5L20 20 12 3.5z"/></svg>';

const fitbit = '<svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="4.6" r="1.9"/><circle cx="12" cy="12" r="2.3"/><circle cx="12" cy="19.4" r="1.9"/><circle cx="6.2" cy="8.3" r="1.7" opacity=".8"/><circle cx="17.8" cy="8.3" r="1.7" opacity=".8"/><circle cx="6.2" cy="15.7" r="1.7" opacity=".8"/><circle cx="17.8" cy="15.7" r="1.7" opacity=".8"/></svg>';

const withings = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9fd6e8" stroke-width="1.8"><rect x="4" y="5" width="16" height="14" rx="3"/><path d="M12 9v3.5" stroke-linecap="round"/><path d="M12 12.5l2.4-1.6" stroke-linecap="round"/></svg>';

const sources = [
  {name:"Apple Health", rec:true, desc:"Steps, weight, sleep, workouts", bg:"#ffffff", mark:heart},
  {name:"WHOOP", desc:"Recovery, HRV, resting HR, sleep", bg:"#0b0b0b", mark:whoop},
  {name:"Oura", desc:"Sleep, readiness, HRV, temperature", bg:"#141414", mark:oura},
  {name:"Strava", desc:"Runs and rides, pace and heart rate", bg:"#fc4c02", mark:strava},
  {name:"Garmin", desc:"Runs, training load, HR, sleep", bg:"#007cc3", mark:garmin},
  {name:"Fitbit", desc:"Steps, sleep, heart rate", bg:"#00b0b9", mark:fitbit},
  {name:"Withings", desc:"Smart scale weight and body data", bg:"#16374a", mark:withings},
];

const checkMark = '<svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';

const sc = document.getElementById('source-cards');
sources.forEach((s)=>{
  const card = document.createElement('div');
  card.className='card';
  const pill = s.rec ? '<span class="pill">Recommended</span>' : '';
  card.innerHTML = `
    <div class="tile" style="background:${s.bg}">${s.mark}</div>
    <div class="meta">
      <div class="name">${s.name}${pill}</div>
      <div class="desc">${s.desc}</div>
    </div>
    <button class="connect-btn">${checkMark}<span class="lab">Connect</span></button>
  `;
  const btn = card.querySelector('.connect-btn');
  const lab = card.querySelector('.lab');
  btn.addEventListener('click',()=>{
    const on = btn.classList.toggle('done');
    card.classList.toggle('connected', on);
    lab.textContent = on ? 'Connected' : 'Connect';
  });
  sc.appendChild(card);
});

/* ---------- habits ---------- */
const ic = {
  am:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6 17 7M7 17l-1.4 1.4" stroke-linecap="round"/></svg>',
  pm:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 14.5A7 7 0 0 1 10 5a7 7 0 1 0 9 9.5z" stroke-linejoin="round"/></svg>',
  water:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3.5c3.5 4 6 7 6 10a6 6 0 0 1-12 0c0-3 2.5-6 6-10z" stroke-linejoin="round"/></svg>',
  steps:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 19c-2 0-3-1.5-3-4 0-2 1-4 1-6 0-2 1-3 2.5-3S10 3 10 6c0 2-.5 3-.5 5 0 1.5.5 2 .5 4 0 2.5-1 4-3 4z" stroke-linejoin="round"/><path d="M16 14c1.6 0 2.6-1.2 2.6-3.2 0-1.6-.8-3.2-.8-4.8 0-1.6-.8-2.4-2-2.4S14 4.4 14 6.8c0 1.6.4 2.4.4 4 0 1.2-.4 1.6-.4 3.2" stroke-linejoin="round"/></svg>',
  mob:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="4.5" r="1.8"/><path d="M12 7v6m0 0 4 5m-4-5-4 5m4-9 4 2m-4-2-4 2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  workout:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6.5 9v6M17.5 9v6M4 10.5v3M20 10.5v3M6.5 12h11" stroke-linecap="round"/></svg>',
  protein:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 3h8l-1 5a4 4 0 0 1-6 0L8 3z" stroke-linejoin="round"/><path d="M9.5 11.5c-.5 3-1 4.5-1 6.5a3.5 3.5 0 0 0 7 0c0-2-.5-3.5-1-6.5" stroke-linejoin="round"/></svg>',
  stretch:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="4.5" r="1.7"/><path d="M8 7v5l-3 6m3-6 6-1 4 4m-10-3 4-1" stroke-linecap="round" stroke-linejoin="round"/></svg>',
};

const habits = [
  {name:"AM vitamins", icon:ic.am},
  {name:"PM vitamins", icon:ic.pm},
  {name:"Water", icon:ic.water},
  {name:"Steps", icon:ic.steps, sel:true},
  {name:"Mobility", icon:ic.mob},
  {name:"Workout", icon:ic.workout},
  {name:"Protein", icon:ic.protein},
  {name:"Stretch", icon:ic.stretch},
];

const tick = '<svg viewBox="0 0 24 24" fill="none" stroke="#1a1206" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
const grid = document.getElementById('habit-grid');
const hcount = document.getElementById('hcount');

function updateCount(){
  const n = grid.querySelectorAll('.habit.sel').length;
  hcount.textContent = n;
}

habits.forEach(h=>{
  const el = document.createElement('div');
  el.className='habit'+(h.sel?' sel':'');
  el.innerHTML = `
    <div class="h-tick">${tick}</div>
    <div class="h-ico">${h.icon}</div>
    <div class="h-name">${h.name}</div>
  `;
  el.addEventListener('click',()=>{el.classList.toggle('sel');updateCount();});
  grid.appendChild(el);
});

const addBtn = document.createElement('button');
addBtn.className='add-custom';
addBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add custom habit';
grid.appendChild(addBtn);
updateCount();

/* ---------- screen toggle ---------- */
function go(which){
  document.getElementById('screen-connect').classList.toggle('active', which==='connect');
  document.getElementById('screen-habits').classList.toggle('active', which==='habits');
  document.getElementById('t-connect').classList.toggle('on', which==='connect');
  document.getElementById('t-habits').classList.toggle('on', which==='habits');
}
</script>
</body>
</html>
